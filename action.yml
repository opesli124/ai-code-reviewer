name: "AI Code Reviewer"
description: "AI-powered code review for Pull Requests using OpenAI, Anthropic Claude, or Ollama"
author: "Auto Company"
branding:
  icon: "shield-check"
  color: "green"
inputs:
  github-token:
    description: "GitHub token for posting comments"
    required: true
  api-key:
    description: "API key for AI service (OpenAI, Anthropic, or Ollama)"
    required: true
  provider:
    description: "AI provider: openai, anthropic, or ollama"
    default: "openai"
    required: false
  model:
    description: "AI model to use"
    default: "gpt-4"
    required: false
  review-prompt:
    description: "Custom prompt for code review"
    default: "You are an expert code reviewer. Analyze the following PR changes and provide feedback on: 1) Security issues, 2) Bug potential, 3) Code quality, 4) Best practices. Be concise but actionable."
    required: false
runs:
  using: "node20"
  main: "dist/index.js"
